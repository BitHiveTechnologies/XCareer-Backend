version: '3.8'

services:
  notifyx-backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/notifyx_prod
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=7d
      - CASHFREE_CLIENT_ID=${CASHFREE_CLIENT_ID}
      - CASHFREE_CLIENT_SECRET=${CASHFREE_CLIENT_SECRET}
      - CASHFREE_WEBHOOK_SECRET=${CASHFREE_WEBHOOK_SECRET}
      - CASHFREE_ENV=${CASHFREE_ENV}
      - CASHFREE_API_VERSION=${CASHFREE_API_VERSION}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - notifyx-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=notifyx_prod
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - notifyx-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - notifyx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - notifyx-backend
    restart: unless-stopped
    networks:
      - notifyx-network

volumes:
  mongo_data:
  redis_data:

networks:
  notifyx-network:
    driver: bridge
